// ─── MOCK AI ENGINE — no API key, no cost ──────────────────────────────────
// Parses real transcript text and extracts meaningful structure
const MockAI = {
  // Simulate a 1.5–2.5s "thinking" delay
  delay: () => new Promise(r => setTimeout(r, 1500 + Math.random() * 1000)),

  // Extract speaker names from transcript lines like "Name: text"
  getSpeakers(text) {
    const names = new Set();
    text.split("\n").forEach(line => {
      const m = line.match(/^([A-Z][a-zA-Z]+):/);
      if (m) names.add(m[1]);
    });
    return [...names];
  },

  // Detect action items — lines with commitment language
  extractActions(text) {
    const lines = text.split("\n").filter(l => l.trim());
    const actions = [];
    const actionPhrases = ["i'll","i will","i can","i should","can you","could you","will you","please","you should","assign","take care","handle","own","follow up","send","prepare","create","write","update","review","draft","check","setup","configure","coordinate","organize","schedule","reach out","get back","compile"];
    const duePhrases = [/by (monday|tuesday|wednesday|thursday|friday|saturday|sunday)/i, /by (end of|eod|cob)/i, /by (next week|tomorrow|today)/i, /by (jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*/i, /by \w+ \d+/i, /within \d+ (day|week|hour)/i];

    lines.forEach(line => {
      const lower = line.toLowerCase();
      const hasAction = actionPhrases.some(p => lower.includes(p));
      if (!hasAction) return;

      const speakerMatch = line.match(/^([A-Z][a-zA-Z]+):\s*(.*)/);
      if (!speakerMatch) return;

      const [, speaker, content] = speakerMatch;
      // Find assignee — who is spoken to
      let assignee = speaker;
      const toMatch = content.match(/([A-Z][a-z]+),?\s+can you|([A-Z][a-z]+),?\s+please|([A-Z][a-z]+),?\s+could you/);
      if (toMatch) assignee = toMatch[1] || toMatch[2] || toMatch[3];

      // Find due date
      let due = null;
      for (const pattern of duePhrases) {
        const m = content.match(pattern);
        if (m) { due = m[0].replace(/^by /i, ""); break; }
      }

      // Clean up the task text
      let task = content
        .replace(/^(I'll|I will|I can|I should)\s+/i, "")
        .replace(/,?\s*by (monday|tuesday|wednesday|thursday|friday|saturday|sunday|end of|next week|tomorrow|today|\w+ \d+|eod|cob).*/i, "")
        .replace(/\?$/, "")
        .trim();

      if (task.length > 15 && task.length < 150) {
        actions.push({
          text: task.charAt(0).toUpperCase() + task.slice(1),
          assignee,
          due: due || "TBD",
          priority: lower.includes("urgent") || lower.includes("critical") || lower.includes("asap") ? "high" : lower.includes("important") ? "high" : "medium"
        });
      }
    });
    return actions.slice(0, 8); // cap at 8
  },

  // Detect decisions — lines with definitive language
  extractDecisions(text) {
    const lines = text.split("\n").filter(l => l.trim());
    const decisions = [];
    const decisionPhrases = ["we decided","we're going to","we will","let's go with","agreed","final decision","we've decided","going with","we'll use","we should","that's a decision","confirmed","approved","resolved to","we're moving"];

    lines.forEach(line => {
      const lower = line.toLowerCase();
      if (!decisionPhrases.some(p => lower.includes(p))) return;
      const m = line.match(/^[A-Z][a-zA-Z]+:\s*(.*)/);
      if (!m) return;
      let decision = m[1]
        .replace(/^(we decided to|we're going to|we will|let's go with|agreed to?|we've decided to?|going with|we should|that's a decision[,.]?\s*)/i, "")
        .replace(/\.$/, "").trim();
      if (decision.length > 10 && decision.length < 200) {
        decisions.push(decision.charAt(0).toUpperCase() + decision.slice(1));
      }
    });
    return [...new Set(decisions)].slice(0, 5);
  },

  // Detect open questions — unresolved questions
  extractQuestions(text) {
    const lines = text.split("\n").filter(l => l.trim());
    const questions = [];
    const openPhrases = ["still open","not resolved","haven't decided","need to figure","unclear","pending","to be determined","tbd","unresolved","not sure","need to check","haven't confirmed"];

    lines.forEach(line => {
      const lower = line.toLowerCase();
      const isQuestion = line.includes("?");
      const isOpen = openPhrases.some(p => lower.includes(p));
      if (!isQuestion && !isOpen) return;
      const m = line.match(/^[A-Z][a-zA-Z]+:\s*(.*)/);
      if (!m) return;
      const q = m[1].trim();
      if (q.length > 10 && q.length < 200 && !questions.includes(q)) {
        questions.push(q);
      }
    });
    return questions.slice(0, 5);
  },

  // Extract main topics
  extractTopics(text) {
    const topicWords = {
      "Performance": ["performance","latency","speed","slow","fast","optimize","bottleneck","memory","cpu"],
      "Architecture": ["architecture","design","structure","microservice","frontend","backend","api","system"],
      "Security": ["security","auth","authentication","encryption","permission","access","token","gdpr","compliance"],
      "Mobile": ["mobile","ios","android","app","responsive","device"],
      "Infrastructure": ["docker","kubernetes","deployment","server","cloud","aws","gcp","ci/cd","pipeline"],
      "Budget": ["budget","cost","spend","finance","money","contractor","hire","headcount"],
      "Product": ["product","feature","roadmap","release","launch","sprint","planning"],
      "Data": ["database","postgres","redis","cache","data","storage","query"],
      "UI/UX": ["ui","ux","design","user","interface","component","frontend","css"],
      "Testing": ["test","qa","bug","fix","error","issue","regression"],
    };
    const lower = text.toLowerCase();
    const found = [];
    Object.entries(topicWords).forEach(([topic, words]) => {
      if (words.filter(w => lower.includes(w)).length >= 2) found.push(topic);
    });
    if (found.length === 0) found.push("Strategy", "Planning");
    return found.slice(0, 5);
  },

  // Generate a smart summary paragraph
  generateSummary(text, decisions, actions, questions) {
    const speakers = MockAI.getSpeakers(text);
    const speakerList = speakers.length > 1
      ? speakers.slice(0,-1).join(", ") + " and " + speakers[speakers.length-1]
      : speakers[0] || "The team";
    const parts = [];
    parts.push(`${speakerList} met to discuss key priorities, reaching ${decisions.length} decision${decisions.length!==1?"s":""} during the session.`);
    if (actions.length > 0) parts.push(`${actions.length} action item${actions.length!==1?"s were":" was"} identified and assigned to team members.`);
    if (questions.length > 0) parts.push(`${questions.length} question${questions.length!==1?"s remain":"s remain"}s open and will need follow-up.`);
    return parts.join(" ");
  },

  // Main analysis function — the drop-in replacement for Claude API
  async analyze(transcript) {
    await MockAI.delay();
    const decisions = MockAI.extractDecisions(transcript);
    const actionItems = MockAI.extractActions(transcript);
    const openQuestions = MockAI.extractQuestions(transcript);
    const topics = MockAI.extractTopics(transcript);
    const summary = MockAI.generateSummary(transcript, decisions, actionItems, openQuestions);
    const speakers = MockAI.getSpeakers(transcript);
    return { summary, decisions, actionItems, openQuestions, topics, speakerCount: speakers.length };
  }
};

// ─── LIVE MEETING ──────────────────────────────────────────────────────────
function LiveMeeting({onEnd}){
  const [phase,setPhase]=useState("consent");
  const [consented,setConsented]=useState({Maya:false,Raj:false,Alex:false,Priya:false});
  const [lines,setLines]=useState([]);
  const [lineIdx,setLineIdx]=useState(0);
  const [charIdx,setCharIdx]=useState(0);
  const [elapsed,setElapsed]=useState(0);
  const [detectedActions,setDetectedActions]=useState([]);
  const [detectedDecisions,setDetectedDecisions]=useState([]);
  const [openQuestions,setOpenQuestions]=useState([]);
  const [aiAnalyzing,setAiAnalyzing]=useState(false);
  const [aiDone,setAiDone]=useState(false);
  const scrollRef=useRef(null);

  const ACTION_MAP={1:{text:"Refactor auth middleware with Redis caching",assignee:"Raj",due:"Thu Apr 17"},4:{text:"Finalize loading + error states for mobile app",assignee:"Alex",due:"Fri Apr 18"},7:{text:"Competitive analysis on error UX patterns",assignee:"Priya",due:"Wed Apr 16"}};
  const DECISION_MAP={3:"Move image processing to dedicated worker queue instead of main thread"};
  const QUESTION_MAP={6:"Should that cover just loading states or error states too?"};

  useEffect(()=>{if(phase!=="live")return;const t=setInterval(()=>setElapsed(e=>e+1),1000);return()=>clearInterval(t);},[phase]);
  useEffect(()=>{
    if(phase!=="live"||lineIdx>=TRANSCRIPT.length)return;
    const cur=TRANSCRIPT[lineIdx];
    if(charIdx<cur.text.length){
      const t=setTimeout(()=>{setLines(prev=>{const n=[...prev];if(n.length<=lineIdx)n.push({...cur,displayText:cur.text.slice(0,charIdx+1)});else n[lineIdx]={...cur,displayText:cur.text.slice(0,charIdx+1)};return n;});setCharIdx(c=>c+1);},20+Math.random()*15);
      return()=>clearTimeout(t);
    }else{
      if(ACTION_MAP[lineIdx])setTimeout(()=>setDetectedActions(d=>[...d,ACTION_MAP[lineIdx]]),400);
      if(DECISION_MAP[lineIdx])setTimeout(()=>setDetectedDecisions(d=>[...d,DECISION_MAP[lineIdx]]),400);
      if(QUESTION_MAP[lineIdx])setTimeout(()=>setOpenQuestions(q=>[...q,QUESTION_MAP[lineIdx]]),400);
      const t=setTimeout(()=>{setLineIdx(i=>i+1);setCharIdx(0);},800);
      return()=>clearTimeout(t);
    }
  },[phase,lineIdx,charIdx]);

  // Auto-run mock AI analysis when transcript finishes
  useEffect(()=>{
    if(phase==="live"&&lineIdx>=TRANSCRIPT.length&&!aiAnalyzing&&!aiDone){
      setAiAnalyzing(true);
      const text=TRANSCRIPT.map(l=>`${l.speaker}: ${l.text}`).join("\n");
      MockAI.analyze(text).then(res=>{
        if(res.decisions.length>0)setDetectedDecisions(res.decisions);
        if(res.openQuestions.length>0)setOpenQuestions(res.openQuestions);
        if(res.actionItems.length>0)setDetectedActions(res.actionItems);
        setAiDone(true);setAiAnalyzing(false);
      });
    }
  },[lineIdx,phase]);

  useEffect(()=>{if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;},[lines]);
  const allConsented=Object.values(consented).every(Boolean);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const speakers=[{n:"Maya",c:T.teal},{n:"Raj",c:T.purple},{n:"Alex",c:T.blue},{n:"Priya",c:T.amber}];

  if(phase==="consent")return(
    <div>
      <div style={{marginBottom:22}}><h1 style={{fontSize:21,fontWeight:600,color:T.text,margin:0}}>Engineering Review</h1><p style={{color:T.textSub,fontSize:13,marginTop:4}}>April 13, 2026 · 2:00 PM · Waiting for all participants to consent</p></div>
      <div style={{maxWidth:540}}>
        <div style={{background:T.amberFade,border:`1px solid ${T.amber}30`,borderRadius:T.r,padding:"13px 15px",marginBottom:22,display:"flex",gap:10}}><AlertCircle size={14} color={T.amber} style={{flexShrink:0,marginTop:1}}/><div style={{fontSize:13,color:T.amber,lineHeight:1.6}}>Recording will not start until all participants confirm consent. Covered by your org's 90-day data retention policy.</div></div>
        <Card style={{marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}><span style={{fontSize:13,fontWeight:500,color:T.text}}>Participant consent</span><span style={{fontSize:12,color:T.textSub}}>{Object.values(consented).filter(Boolean).length} / 4 confirmed</span></div>
          <div style={{width:"100%",height:4,background:T.bg4,borderRadius:2,marginBottom:18,overflow:"hidden"}}><div style={{height:"100%",background:allConsented?T.green:T.teal,borderRadius:2,width:`${(Object.values(consented).filter(Boolean).length/4)*100}%`,transition:"width 0.4s"}}/></div>
          {Object.entries(consented).map(([name,agreed])=>(
            <div key={name} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:`1px solid ${T.border}`}}>
              <Avatar initials={name.slice(0,2).toUpperCase()} color={agreed?T.green:T.textFaint} size={36}/>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:T.text}}>{name}</div><div style={{fontSize:11,color:T.textFaint}}>This meeting will be recorded and transcribed by AI</div></div>
              {agreed?<Badge color={T.green}>Consented ✓</Badge>:<button onClick={()=>setConsented(c=>({...c,[name]:true}))} style={{padding:"6px 14px",borderRadius:7,border:`1px solid ${T.teal}40`,background:T.tealFade,color:T.teal,fontSize:12,cursor:"pointer"}}>I consent</button>}
            </div>
          ))}
        </Card>
        <button disabled={!allConsented} onClick={()=>setPhase("live")} style={{width:"100%",padding:13,borderRadius:9,border:"none",background:allConsented?T.teal:T.bg4,color:allConsented?"#0d1017":T.textFaint,fontSize:14,fontWeight:600,cursor:allConsented?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all 0.2s"}}>
          <Play size={15}/> Start recording & transcription
        </button>
      </div>
    </div>
  );

  if(phase==="ending")return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"64vh",gap:14}}>
      <Spinner size={32}/><h2 style={{color:T.text,fontSize:20,margin:0,fontWeight:600}}>Generating AI summary…</h2>
      <p style={{color:T.textSub,fontSize:13}}>Extracting decisions · action items · open questions · topics</p>
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
        <div><h1 style={{fontSize:21,fontWeight:600,color:T.text,margin:0}}>Engineering Review</h1>
          <div style={{display:"flex",alignItems:"center",gap:10,marginTop:6}}>

// ─── ACTION TRACKER ────────────────────────────────────────────────────────
function ActionTracker({actions,setActions}){
  const [filter,setFilter]=useState("all");
  const [search,setSearch]=useState("");
  const FILTERS=[{id:"all",label:"All"},{id:"mine",label:"Mine"},{id:"overdue",label:"Overdue"},{id:"high",label:"High priority"},{id:"active",label:"Active"},{id:"done",label:"Completed"}];
  const filtered=actions.filter(a=>{
    const ms=!search||a.text.toLowerCase().includes(search.toLowerCase())||a.assignee.toLowerCase().includes(search.toLowerCase());
    if(!ms)return false;
    if(filter==="overdue")return a.status==="overdue";
    if(filter==="high")return a.priority==="high";
    if(filter==="done")return a.status==="done";
    if(filter==="active")return a.status!=="done";
    if(filter==="mine")return a.assignee==="Maya Chen";
    return true;
  });
  const cycleStatus=id=>{const c={todo:"in-progress","in-progress":"done",done:"todo",overdue:"in-progress"};setActions(prev=>prev.map(a=>a.id===id?{...a,status:c[a.status]||"todo"}:a));};
  const open=actions.filter(a=>a.status!=="done").length;
  const overdue=actions.filter(a=>a.status==="overdue").length;
  return(
    <div>
      <div style={{marginBottom:20}}><h1 style={{fontSize:21,fontWeight:600,color:T.text,margin:0}}>Action Tracker</h1><p style={{color:T.textSub,fontSize:13,marginTop:4}}>{open} open · {overdue} overdue · {actions.filter(a=>a.status==="done").length} completed · Click status badge to update</p></div>
      <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center"}}>
        <div style={{position:"relative",flex:1,maxWidth:320}}>
          <Search size={13} color={T.textFaint} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search actions or assignees…" style={{width:"100%",height:36,paddingLeft:34,paddingRight:12,background:T.bg2,border:`1px solid ${T.border}`,borderRadius:8,color:T.text,fontSize:12,outline:"none"}}/>
        </div>
        <div style={{display:"flex",gap:6}}>
          {FILTERS.map(f=><button key={f.id} onClick={()=>setFilter(f.id)} style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${filter===f.id?T.teal+"50":T.border}`,background:filter===f.id?T.tealFade:"none",color:filter===f.id?T.teal:T.textSub,fontSize:11,cursor:"pointer",fontWeight:filter===f.id?500:400}}>{f.label}</button>)}
        </div>
      </div>
      <Card style={{padding:0,overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr style={{borderBottom:`1px solid ${T.border}`}}>{["Action item","Assignee","Source meeting","Due date","Priority","Status"].map(h=><th key={h} style={{padding:"11px 16px",textAlign:"left",fontSize:10,color:T.textFaint,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em"}}>{h}</th>)}</tr></thead>
          <tbody>
            {filtered.map((a,i)=>(
              <tr key={a.id} style={{borderBottom:i<filtered.length-1?`1px solid ${T.border}`:"none",opacity:a.status==="done"?0.5:1,transition:"opacity 0.2s"}}>
                <td style={{padding:"12px 16px",fontSize:13,color:T.text,textDecoration:a.status==="done"?"line-through":"none",maxWidth:280}}>{a.text}</td>
                <td style={{padding:"12px 16px"}}><div style={{display:"flex",alignItems:"center",gap:7}}><Avatar initials={a.initials} color={a.color} size={22}/><span style={{fontSize:12,color:T.textSub}}>{a.assignee.split(" ")[0]}</span></div></td>
                <td style={{padding:"12px 16px",fontSize:12,color:T.textFaint}}>{a.meeting}</td>
                <td style={{padding:"12px 16px",fontSize:12,color:a.status==="overdue"?T.red:T.textSub,fontWeight:a.status==="overdue"?500:400}}>{a.due}</td>
                <td style={{padding:"12px 16px"}}><div style={{display:"flex",alignItems:"center",gap:6}}><PriorityDot priority={a.priority}/><span style={{fontSize:11,color:T.textFaint,textTransform:"capitalize"}}>{a.priority}</span></div></td>
                <td style={{padding:"12px 16px"}}><button onClick={()=>cycleStatus(a.id)} style={{border:"none",background:"none",cursor:"pointer",padding:0}} title="Click to cycle status"><StatusBadge status={a.status}/></button></td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length===0&&<div style={{padding:"32px 16px",textAlign:"center",color:T.textFaint,fontSize:13}}>No action items match this filter</div>}
      </Card>
    </div>
  );
}

// ─── LIBRARY ───────────────────────────────────────────────────────────────
function Library({onNav}){
  const [q,setQ]=useState("");
  const results=MEETINGS.filter(m=>!q||m.title.toLowerCase().includes(q.toLowerCase())||m.topics.some(t=>t.toLowerCase().includes(q.toLowerCase())));
  return(
    <div>
      <div style={{marginBottom:22}}><h1 style={{fontSize:21,fontWeight:600,color:T.text,margin:0}}>Meeting Library</h1><p style={{color:T.textSub,fontSize:13,marginTop:4}}>Searchable archive of all past meetings and transcripts</p></div>
      <div style={{position:"relative",marginBottom:18}}><Search size={14} color={T.textFaint} style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)"}}/><input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search by title, topic, or platform…" style={{width:"100%",height:40,paddingLeft:38,paddingRight:16,background:T.bg2,border:`1px solid ${T.border}`,borderRadius:9,color:T.text,fontSize:13,outline:"none"}}/></div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {results.map(m=>(
          <div key={m.id} onClick={()=>onNav("summary")} style={{background:T.bg2,borderRadius:T.rLg,padding:"16px 20px",border:`1px solid ${T.border}`,cursor:"pointer",transition:"border-color 0.15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.teal+"50"} onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}><div><div style={{fontSize:14,fontWeight:500,color:T.text,marginBottom:3}}>{m.title}</div><div style={{fontSize:11,color:T.textFaint}}>{m.date} · {m.duration} min · {m.participants} participants · {m.platform}</div></div><ChevronRight size={14} color={T.textFaint} style={{marginTop:2}}/></div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap"}}><Badge color={T.blue}>{m.decisions} decisions</Badge><Badge color={T.green}>{m.actions} actions</Badge>{m.questions>0&&<Badge color={T.amber}>{m.questions} open questions</Badge>}{m.topics.slice(0,3).map(t=><Badge key={t} color={T.textFaint}>{t}</Badge>)}</div>
          </div>
        ))}
        {results.length===0&&<div style={{padding:40,textAlign:"center",color:T.textFaint,fontSize:13}}>No meetings found for "{q}"</div>}
      </div>
    </div>
  );
}

// ─── ANALYTICS ─────────────────────────────────────────────────────────────
function Analytics({actions}){
  const done=actions.filter(a=>a.status==="done").length;
  const inProg=actions.filter(a=>a.status==="in-progress").length;
  const overdue=actions.filter(a=>a.status==="overdue").length;
  const todo=actions.filter(a=>a.status==="todo").length;
  const total=actions.length;
  const weekly=[{w:"W10",m:9},{w:"W11",m:12},{w:"W12",m:8},{w:"W13",m:11},{w:"W14",m:7}];
  const maxM=Math.max(...weekly.map(d=>d.m));
  const topics=[{name:"Performance",count:18},{name:"Architecture",count:15},{name:"Roadmap",count:12},{name:"Compliance",count:9},{name:"Hiring",count:7},{name:"Research",count:5}];
  const people=[{name:"Maya",i:"MC",c:T.teal,rate:84},{name:"Raj",i:"RK",c:T.purple,rate:78},{name:"Priya",i:"PD",c:T.amber,rate:71},{name:"Alex",i:"AT",c:T.blue,rate:63}];
  const donutItems=[{count:done,color:T.green,label:"Done"},{count:inProg,color:T.blue,label:"In progress"},{count:todo,color:T.textFaint,label:"To do"},{count:overdue,color:T.red,label:"Overdue"}];
  const circ=2*Math.PI*32;let off=0;
  return(
    <div>
      <div style={{marginBottom:22}}><h1 style={{fontSize:21,fontWeight:600,color:T.text,margin:0}}>Analytics</h1><p style={{color:T.textSub,fontSize:13,marginTop:4}}>Organization-wide meeting intelligence · Last 30 days</p></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:22}}>
        <StatCard label="Total meetings" value="47" sub="5 this week" icon={Video} iconColor={T.blue}/>
        <StatCard label="Action items" value="183" sub="Created this month" icon={CheckSquare} iconColor={T.teal}/>
        <StatCard label="Completion rate" value={`${Math.round(done/total*100)}%`} sub="↑ +6% vs last month" subColor={T.green} icon={TrendingUp} iconColor={T.green}/>
        <StatCard label="Hrs in meetings" value="94h" sub="Saved 18h vs target" subColor={T.green} icon={Clock} iconColor={T.amber}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
        <Card>
          <div style={{fontSize:13,fontWeight:500,color:T.text,marginBottom:20}}>Meetings per week</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:8,height:100,padding:"0 4px"}}>
            {weekly.map((d,i)=>(
              <div key={d.w} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5,height:"100%",justifyContent:"flex-end"}}>
                <span style={{fontSize:10,color:T.textFaint}}>{d.m}</span>
                <div style={{width:"100%",height:`${(d.m/maxM)*70}px`,background:i===weekly.length-1?T.teal+"cc":T.blue+"60",borderRadius:"4px 4px 0 0",transition:"height 0.5s ease"}}/>
                <span style={{fontSize:10,color:T.textFaint}}>{d.w}</span>
              </div>
            ))}
          </div>
        </Card>
        <Card>
          <div style={{fontSize:13,fontWeight:500,color:T.text,marginBottom:16}}>Action item breakdown</div>
          <div style={{display:"flex",gap:20,alignItems:"center"}}>
            <svg width={80} height={80} viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="32" fill="none" stroke={T.bg4} strokeWidth="14"/>
              {donutItems.map((item,idx)=>{const dash=(item.count/total)*circ;const el=<circle key={idx} cx="40" cy="40" r="32" fill="none" stroke={item.color} strokeWidth="13" strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-off} transform="rotate(-90 40 40)"/>;off+=dash;return el;})}
              <text x="40" y="44" textAnchor="middle" fontSize="13" fontWeight="600" fill={T.text}>{total}</text>
            </svg>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
              {donutItems.map((item,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:12}}><div style={{width:7,height:7,borderRadius:"50%",background:item.color}}/><span style={{flex:1,color:T.textSub}}>{item.label}</span><span style={{color:T.text,fontWeight:500}}>{item.count}</span></div>)}
            </div>
          </div>
        </Card>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <Card>
          <div style={{fontSize:13,fontWeight:500,color:T.text,marginBottom:16}}>Most discussed topics</div>
          {topics.map(t=>(
            <div key={t.name} style={{display:"flex",alignItems:"center",gap:10,marginBottom:11}}>
              <span style={{fontSize:12,color:T.textSub,width:88,flexShrink:0}}>{t.name}</span>
              <div style={{flex:1,height:5,background:T.bg4,borderRadius:3,overflow:"hidden"}}><div style={{width:`${(t.count/topics[0].count)*100}%`,height:"100%",background:T.blue+"90",borderRadius:3}}/></div>
              <span style={{fontSize:11,color:T.textFaint,width:20,textAlign:"right"}}>{t.count}</span>
            </div>
          ))}
        </Card>
        <Card>
          <div style={{fontSize:13,fontWeight:500,color:T.text,marginBottom:16}}>Completion rate by person</div>
          {people.map(p=>(
            <div key={p.name} style={{display:"flex",alignItems:"center",gap:10,marginBottom:13}}>
              <Avatar initials={p.i} color={p.c} size={26}/><span style={{fontSize:12,color:T.textSub,width:46}}>{p.name}</span>
              <div style={{flex:1,height:5,background:T.bg4,borderRadius:3,overflow:"hidden"}}><div style={{width:`${p.rate}%`,height:"100%",background:p.rate>=75?T.green+"90":T.amber+"90",borderRadius:3}}/></div>
              <span style={{fontSize:12,fontWeight:600,color:T.text,width:36,textAlign:"right"}}>{p.rate}%</span>
            </div>
          ))}
          <div style={{marginTop:6,padding:"10px 0",borderTop:`1px solid ${T.border}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{fontSize:12,color:T.textSub,flex:1}}>Team average</div><span style={{fontSize:13,fontWeight:700,color:T.teal}}>{Math.round(people.reduce((a,p)=>a+p.rate,0)/people.length)}%</span></div>
          </div>
        </Card>
      </div>
    </div>
  );
}

// ─── REMINDERS ─────────────────────────────────────────────────────────────
function Reminders({actions}){
  const [rules,setRules]=useState([
    {id:"r1",name:"Due date reminder",trigger:"24 hours before due date",channels:["Email","Slack"],active:true},
    {id:"r2",name:"Overdue escalation",trigger:"1 day after due date",channels:["Email","Manager"],active:true},
    {id:"r3",name:"Weekly digest",trigger:"Every Monday at 8:00 AM",channels:["Email"],active:false},
    {id:"r4",name:"Meeting summary delivery",trigger:"Within 5 min of meeting end",channels:["Email","Slack"],active:true},
    {id:"r5",name:"In-progress stale alert",trigger:"No update for 3 days",channels:["Slack"],active:true},
  ]);
  const toggleRule=id=>setRules(rs=>rs.map(r=>r.id===id?{...r,active:!r.active}:r));
  const upcoming=actions.filter(a=>a.status!=="done"&&a.status!=="overdue");
  const overdueItems=actions.filter(a=>a.status==="overdue");
  return(
    <div>
      <div style={{marginBottom:22}}><h1 style={{fontSize:21,fontWeight:600,color:T.text,margin:0}}>Reminders</h1><p style={{color:T.textSub,fontSize:13,marginTop:4}}>Automated follow-up rules, escalation paths, and notification channels</p></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div>
          <Card style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:600,color:T.textSub,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:16}}>Reminder rules</div>
            {rules.map((rule,i)=>(
              <div key={rule.id} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"13px 0",borderBottom:i<rules.length-1?`1px solid ${T.border}`:"none"}}>
                <div onClick={()=>toggleRule(rule.id)} style={{width:36,height:20,borderRadius:10,background:rule.active?T.teal:T.bg4,border:`1px solid ${rule.active?T.teal:T.border}`,cursor:"pointer",flexShrink:0,position:"relative",transition:"all 0.2s",marginTop:2}}>
                  <div style={{position:"absolute",top:2,left:rule.active?16:2,width:14,height:14,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
                </div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:T.text}}>{rule.name}</div><div style={{fontSize:11,color:T.textFaint,marginTop:2}}>{rule.trigger}</div><div style={{display:"flex",gap:6,marginTop:6}}>{rule.channels.map(ch=><Badge key={ch} color={T.textFaint}>{ch}</Badge>)}</div></div>
              </div>
            ))}
          </Card>
          <Card>
            <div style={{fontSize:12,fontWeight:600,color:T.textSub,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:14}}>Notification channels</div>
            {[{name:"Email",detail:"you@company.com",on:true},{name:"Slack",detail:"#action-items channel",on:true},{name:"Asana",detail:"Tasks synced directly",on:true},{name:"Jira",detail:"Not configured",on:false},{name:"Google Calendar",detail:"Calendar events synced",on:true}].map((ch,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:i<4?`1px solid ${T.border}`:"none"}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:ch.on?T.green:T.textFaint,flexShrink:0}}/>
                <div style={{flex:1}}><div style={{fontSize:13,color:T.text}}>{ch.name}</div><div style={{fontSize:11,color:T.textFaint}}>{ch.detail}</div></div>
                <Badge color={ch.on?T.green:T.textFaint}>{ch.on?"Connected":"Setup required"}</Badge>
              </div>
            ))}
          </Card>
        </div>
        <div>
          {overdueItems.length>0&&<div style={{background:T.redFade,borderRadius:T.r,padding:"13px 15px",border:`1px solid ${T.red}30`,marginBottom:16,display:"flex",gap:10}}><AlertCircle size={14} color={T.red} style={{flexShrink:0,marginTop:1}}/><div><div style={{fontSize:13,fontWeight:500,color:T.red}}>{overdueItems.length} items overdue</div><div style={{fontSize:12,color:T.red+"aa",marginTop:3,lineHeight:1.55}}>Escalation reminders sent. Items: {overdueItems.map(a=>a.text.slice(0,28)+"…").join(", ")}</div></div></div>}
          <Card>
            <div style={{fontSize:12,fontWeight:600,color:T.textSub,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:16}}>Upcoming reminders</div>
            {upcoming.slice(0,6).map((a,i)=>(
              <div key={a.id} style={{display:"flex",alignItems:"center",gap:11,padding:"10px 0",borderBottom:i<Math.min(5,upcoming.length-1)?`1px solid ${T.border}`:"none"}}>
                <div style={{width:34,height:34,borderRadius:8,background:T.amberFade,border:`1px solid ${T.amber}30`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Bell size={13} color={T.amber}/></div>
                <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:500,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.text}</div><div style={{fontSize:11,color:T.textFaint}}>{a.assignee.split(" ")[0]} · Due {a.due}</div></div>
                <span style={{fontSize:11,color:T.amber,flexShrink:0}}>24h notice</span>
              </div>
            ))}
          </Card>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ──────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("dashboard");
  const [actions,setActions]=useState(INIT_ACTIONS);
  const overdueCount=actions.filter(a=>a.status==="overdue").length;
  const addActions=newActions=>setActions(prev=>[...newActions,...prev]);

  return(
    <div style={{display:"flex",height:"100vh",background:T.bg0,overflow:"hidden",fontSize:14}}>
      <Sidebar current={view} onNav={setView} overdueCount={overdueCount}/>
      <main style={{flex:1,overflowY:"auto",padding:"28px 32px"}}>
        {view==="dashboard"&&<Dashboard onNav={setView} actions={actions}/>}
        {view==="setup"&&<MeetingSetup onNav={setView}/>}
        {view==="live"&&<LiveMeeting onEnd={()=>setView("summary")}/>}
        {view==="summary"&&<SummaryView/>}
        {view==="tracker"&&<ActionTracker actions={actions} setActions={setActions}/>}
        {view==="analyze"&&<AIAnalyzer onAddActions={addActions}/>}
        {view==="library"&&<Library onNav={setView}/>}
        {view==="analytics"&&<Analytics actions={actions}/>}
        {view==="reminders"&&<Reminders actions={actions}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
