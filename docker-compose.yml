version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# MeetIQ — Docker Compose
# Usage:
#   1. cp .env.example .env  and set ANTHROPIC_API_KEY
#   2. docker compose up --build
#   3. Open http://localhost:5173
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── API Proxy Server ──────────────────────────────────────────────────────
  # Holds the Anthropic API key and forwards requests from the frontend.
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: meetiq-server
    env_file: .env
    ports:
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── React Frontend ────────────────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meetiq-client
    ports:
      - "5173:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
